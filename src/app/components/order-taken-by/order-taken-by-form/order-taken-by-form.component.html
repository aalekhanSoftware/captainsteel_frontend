<div class="user-container form-container">
  <div class="card">
    <div class="card-header">
      <h2>
        <i class="fas" [ngClass]="isEditMode ? 'fa-edit' : 'fa-plus-circle'"></i>
        {{ isEditMode ? 'Edit Order Taken By' : 'Add Order Taken By' }}
      </h2>
      <button class="btn btn-sm btn-outline-secondary" routerLink="/order-taken-by" [disabled]="isLoading">
        <i class="fas fa-arrow-left"></i> Back to List
      </button>
    </div>

    <div class="card-body">
      <app-loader [show]="isLoading"></app-loader>
      
      <form [formGroup]="form" (ngSubmit)="onSubmit()" *ngIf="!isLoading || isEditMode">
        <div class="form-row">
          <div class="form-group">
            <label for="name">Name <span class="text-danger">*</span></label>
            <input 
              type="text" 
              id="name" 
              formControlName="name" 
              class="form-control" 
              [ngClass]="{'is-invalid': isFieldInvalid('name')}"
              placeholder="Enter name"
            >
            <div class="invalid-feedback" *ngIf="isFieldInvalid('name')">
              Name is required
            </div>
          </div>

          <div class="form-group">
            <label for="status">Status <span class="text-danger">*</span></label>
            <select 
              id="status" 
              formControlName="status" 
              class="form-control"
              [ngClass]="{'is-invalid': isFieldInvalid('status')}"
            >
              <option value="A">Active</option>
              <option value="I">Inactive</option>
            </select>
            <div class="invalid-feedback" *ngIf="isFieldInvalid('status')">
              Status is required
            </div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group full-width">
            <label for="remarks">Remarks</label>
            <textarea 
              id="remarks" 
              formControlName="remarks" 
              class="form-control" 
              rows="3"
              placeholder="Enter optional remarks"
            ></textarea>
          </div>
        </div>

        <div class="form-actions mt-4">
          <button type="button" class="btn btn-secondary" routerLink="/order-taken-by" [disabled]="isLoading">
            Cancel
          </button>
          <button type="submit" class="btn btn-primary" [disabled]="isLoading || form.invalid">
            <i class="fas" [ngClass]="isEditMode ? 'fa-save' : 'fa-paper-plane'"></i>
            {{ isEditMode ? 'Update' : 'Submit' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
